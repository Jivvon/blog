summary: |
  5년차 플랫폼/데브옵스 엔지니어로, EKS와 Terraform 기반의 대규모 멀티 클러스터 환경을 관리하며 인프라 파편화를 해소하는 일에 몰두하고 있습니다.
  특히 최근에는 개발 조직 전체의 생산성(DX)을 극대화하기 위해, 개발자가 스스로 안전하게 리소스를 프로비저닝할 수 있는 사내 내부 개발자 플랫폼(IDP, QWER) 설계 및 구축을 주도하고 있습니다.

  Zero-downtime 마이그레이션과 플랫폼 아키텍처 고도화뿐 아니라, 최근에는 AI 에이전트와 LLM을 로컬 워크플로우 및 DevSecOps 파이프라인에 적극 통합하여 휴먼 에러를 통제하고 엔지니어링 리듬을 한 차원 높이는 혁신을 지속해서 전파하고 있습니다.

