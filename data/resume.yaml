summary: |
  5년차 데브옵스 엔지니어로, On-Premise 및 EKS 환경에서의 Kubernetes 클러스터 운영 전문성을 바탕으로 대규모 인프라 구조를 다룹니다.
  단순한 인프라 관리를 넘어, 개발자가 직접 사용할 수 있는 내부 개발자 플랫폼(IDP, QWER)을 개발하여 인프라의 파편화를 줄이고 전체적인 생산성을 높이는 일에 힘쓰고 있습니다.

  어렵고 도전적인 과제일수록 더 나은 아키텍처와 해결책을 고민하며, 최근에는 인프라 설정 도구부터 업무 워크플로우 전반에 AI를 적극 활용하여 효율을 높이고 있습니다. 개인 환경 스크립트 구성이나 터미널 워크플로우에 기반한 AI 에이전트를 접목하여 휴먼 에러를 방지하고 업무 생산성을 극대화하고 있습니다.
  기술이나 도구를 단순히 사용하는 데 그치지 않고, 그 이면의 동작 원리와 메커니즘을 끈질기게 파고들어 깊이 있게 이해하려 노력합니다.

