      - "실시간 화상/음성 통신(Meet) 인프라 설계 및 WebRTC 통화 녹음 서버 부하 테스트, 어피니티 분석 수행. 컨테이너 리소스 스케일링 기준을 내부 사례에 맞게 최적화하여 권장 설정값 대비 인스턴스 처리량을 70% 증가"
